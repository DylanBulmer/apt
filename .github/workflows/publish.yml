name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - packages/**
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to apply to the Docker image
        required: false
        type: string
      republish:
        description: Republish existing packages without rebuilding
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y --no-install-recommends build-essential reprepro

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

      - name: Build packages
        if: ${{ inputs.republish != true }}
        run: |
          bash scripts/build.sh mc-server
          bash scripts/build.sh mc-rcon

      - name: Publish packages to repo
        if: ${{ inputs.republish != true }}
        run: |
          for deb in dist/*.deb; do
            bash scripts/publish.sh "$deb"
          done

      - name: Upload package artifacts
        if: ${{ inputs.republish != true }}
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*.deb
          retention-days: 90

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.republish == 'true' && inputs.version != '' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            RELEASE_TIME=${{ github.event.release.created_at }}
            GIT_REPO=${{ github.repository }}
            GIT_COMMIT_SHA=${{ github.sha }}
            GIT_COMMIT_TIME=${{ github.event.head_commit.timestamp }}
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
