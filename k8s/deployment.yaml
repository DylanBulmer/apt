apiVersion: apps/v1
kind: Deployment
metadata:
  name: apt-repo
  namespace: apt-repo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apt-repo
  template:
    metadata:
      labels:
        app: apt-repo
    spec:
      containers:
        - name: nginx
          image: ghcr.io/dylanbulmer/apt:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
          readinessProbe:
            httpGet:
              path: /bulmer.asc
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
