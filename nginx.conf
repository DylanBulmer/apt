server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Don't advertise nginx version in headers or error pages
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"           always;
    add_header Referrer-Policy         "no-referrer"    always;

    # Debian tooling expects these content types
    types {
        application/octet-stream  deb udeb;
        text/plain                asc gpg Release Packages Sources InRelease;
        application/gzip          gz;
        application/x-bzip2       bz2;
        application/x-xz          xz;
    }

    # Clients fetch this to verify signed Release files
    location = /bulmer.asc {
        add_header Cache-Control "max-age=3600" always;
    }

    # Release metadata must always be fresh
    location /dists/ {
        autoindex on;
        add_header Cache-Control "no-cache" always;
    }

    # Packages are content-addressed; safe to cache aggressively
    location /pool/ {
        autoindex on;
        add_header Cache-Control "max-age=86400" always;
    }

    # Deny everything else — conf/, db/, and any other paths
    location / {
        return 404;
    }
}
