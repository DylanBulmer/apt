# mc global defaults — values here are overridden by /etc/minecraft/server.conf

# Default RAM allocation
SERVER_RAM="4G"

# JVM flags — leave empty to let start.sh auto-select based on Java version.
#   Java 21+  → Generational ZGC  (sub-millisecond pauses, recommended)
#   Java 17   → Aikar's G1GC tuning (~200ms pause target)
SERVER_FLAGS=""

# Extra JVM options (e.g. -Dfile.encoding=UTF-8)
JAVA_OPTS=""

# Number of backup archives to retain
BACKUP_KEEP=7

# Backup schedule (systemd OnCalendar= syntax — e.g. weekly, daily, "Mon *-*-* 02:00:00")
BACKUP_SCHEDULE="weekly"

# Default server type for new installs (vanilla, paper, fabric, neoforge)
DEFAULT_SERVER_TYPE="vanilla"
