# mc global defaults
# Per-server configs in /etc/minecraft/<name>.conf override these.

# Default RAM allocation for new servers
SERVER_RAM="4G"

# JVM flags — leave empty to let start.sh auto-select based on the Java version.
# Set explicitly here or in a per-server config to override.
#
#   Java 21+  → Generational ZGC  (sub-millisecond pauses, recommended)
#   Java 17   → Aikar's G1GC tuning (~200ms pause target)
#
# Example override for Java 21:
#   SERVER_FLAGS="-XX:+UseZGC -XX:+ZGenerational -XX:-ZUncommit -XX:+AlwaysPreTouch -XX:+DisableExplicitGC"
SERVER_FLAGS=""

# Extra JVM options appended after SERVER_FLAGS (e.g. -Dfile.encoding=UTF-8)
JAVA_OPTS=""

# How many backup archives to retain per server
BACKUP_KEEP=7

# Default server type for new servers (paper, vanilla, fabric)
DEFAULT_SERVER_TYPE="fabric"
